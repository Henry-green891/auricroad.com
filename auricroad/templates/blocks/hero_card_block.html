<div class="hero-card top-accent">
    {{ image(value.icon, "fill-150x150", class="hero-card-icon") }}
    <h2 class="header font-b size-2">{{ value.header }}</h2>
    <h6 class="subheader font-a size-6">{{ value.subheader }}</h6>
    <div class="partial-horizontal-line"></div>
    <p class="body font-d size-4">{{ value.body }}</p>
</div>
