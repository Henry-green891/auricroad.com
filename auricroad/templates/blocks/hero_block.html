<div class="hero">
    <div class="static-hero">
        <h1 class="tagline font-f size-1">{{ value.static_tagline }}</h1>
        <div class="center-vertical-line white"></div>
        <h2 class="header font-a size-2">{{ value.static_header }}</h2>
        <div class="body font-e size-2">{{ value.static_body|richtext }}</div>
    </div>
    {% if value.cards %}
        <div class="hero-cards">
            {{ value.cards }}
        </div>
    {% endif %}
</div>
