<div class="hotels-destination">
    <div class="static-section-header">
        <h1 class="tagline font-f size-1">{{ value.tagline|upper }}</h1>
        <div class="center-vertical-line gray"></div>
        <div class="accented-text-wrapper">
            <h3 class="accented-text header font-a size-3">{{ value.header }}</h3>
        </div>
        <h2 class="body semi-bold font-e size-2">{{ value.body|richtext }}</h2>
    </div>
    <div
        class="destinations-image-section"
        {% if value.background_image %}
            {% set background_image=image(value.background_image, "fill-2880x1350") %}
            style="background-image: url('{{ background_image.url }}');"
        {% endif %}
    >
        {% if value.foreground_image %}
            {{ image(value.foreground_image, "fill-2880x2880", class="accent-image", alt="destination")}}
        {% endif %}
    </div>
</div>
