<div class="button-container">
  {% if value.button_text %}
  <a class="button-wrapper" href="{% if value.internal_page %}{{ value.internal_page.url }}{% elif value.external_link %}{{ value.external_link}}{% endif %}">
    <button class="button black rounded font-c size-2">{{ value.button_text }}</button>
  </a>
  {% endif %}
</div>
