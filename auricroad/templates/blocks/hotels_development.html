<div class="hotels-development">
    <div class="hotels-development-inner">
        <div class="hotels-development-static">
            <h1 class="tagline font-f size-1">{{ value.tagline|upper }}</h1>
            <div class="center-vertical-line gray"></div>
            <h3 class="header font-a size-3">{{ value.header }}</h3>
            <h2 class="body font-e size-2">{{ value.body|richtext }}</h2>
        </div>
        {% if value.cards %}
            <div class="development-cards">
                {{ value.cards }}
            </div>
        {% endif %}
        </div>
    </div>
</div>
