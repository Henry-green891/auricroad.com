version: 2.1
orbs:
  python: circleci/python@1.2
  node: circleci/node@4.1
  heroku: circleci/heroku@1.2

jobs:
  build:
    docker:
      - image: cimg/python:3.9-node  # Using the Python image with the pre-installed Node.js, but we will adjust Node version.
    steps:
      - checkout
      - run:
          name: Install system dependencies for Pillow  # Keeping Pillow dependencies installation intact
          command: |
            sudo apt-get update 
            sudo apt-get install -y libjpeg-dev libfreetype6-dev zlib1g-dev libjpeg-turbo8 build-essential
            sudo apt-get install -y libjpeg-turbo8
      - node/install-packages:  # Correct way to use the node orb to install Node.js
          version: "16.9.0"  # Specify the Node.js version here
          pkg-manager: npm
          cache-path: ~/.npm
      - python/install-packages:
          pkg-manager: pip
          pypi-cache: true
          app-dir: ~/project
      - run: npm install
      - run: npm install webpack
      - run: npm run build

  test:
    docker:
      - image: cimg/python:3.9-node  # Keeping Python but fixing Node version below
        environment:
          DJANGO_SETTINGS_MODULE: auricroad.auricroad.settings.circleci
      - image: circleci/postgres:10-alpine-postgis
        environment:
          POSTGRES_USER: ubuntu
          POSTGRES_DB: circle_test
      - image: circleci/redis
    working_directory: /home/circleci/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - dependencies-{{ checksum "requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
      - run:
          command: |
            echo 'export PATH=/home/circleci/.local/bin/:$PATH' >> $BASH_ENV
            source $BASH_ENV
      - node/install-packages:  # Correct way to use the node orb to install Node.js
          version: "16.9.0"  # Specify the Node.js version here
          pkg-manager: npm
          cache-path: ~/.npm
      - run:
          name: Install system dependencies for Pillow and cryptography
          command: |
            sudo apt-get update 
            sudo apt-get install -y libjpeg-dev libfreetype6-dev zlib1g-dev libjpeg-turbo8 build-essential libssl-dev libffi-dev python3-dev cargo
      - run: pip install --user -r requirements-dev.txt
      - run: npm install
      - run: npm install webpack
      - run: npm run build
      - run: bandit -r auricroad/ -l --ini .bandit -x tests.py
      - run: isort --recursive --check-only --builtin django --skip-glob "*/migrations/*.py" auricroad/
      - run: prospector auricroad -X -I "auricroad/settings/*" || true
      - run: coverage run --source='.' manage.py test
      - run: codecov

  deploy:
    docker:
        - image: buildpack-deps:trusty
    working_directory: /home/circleci/project
    steps:
      - checkout
      - run:
          name: "Deploy"
          command: |
            if [ "${CIRCLE_BRANCH}" == "develop" ]; then \
              git push https://heroku:$HEROKU_API_KEY@git.heroku.com/auricroad-dev.git develop:master; \
            elif [ "${CIRCLE_BRANCH}" == "staging" ]; then \
              git push https://heroku:$HEROKU_API_KEY@git.heroku.com/auricroad-staging.git staging:master; \
            elif [ "${CIRCLE_BRANCH}" == "master" ]; then \
              git push https://heroku:$HEROKU_API_KEY@git.heroku.com/auricroad-prod.git master; \
            fi

workflows:
  version: 2.1 
  build_test_deploy:
    jobs:
      - build 
      - test:
          requires:
            - build 
      - deploy:
          requires:
            - test
