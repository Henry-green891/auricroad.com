version: 2
jobs:
  build:
      docker:
        - image: circleci/python:3.9.18-stretch-node-browsers
      steps:
        - checkout
        - restore_cache:
            keys:
            - dependencies-{{ checksum "requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
        - run: pip install --user -r requirements.txt
        - run: npm install
        - run: npm install webpack
        - run: npm run build
        - save_cache:
            key: dependencies-{{ checksum "requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
            paths:
              - ~/.cache/pip
  test:
    docker:
      - image: circleci/python:3.9.18-stretch-node-browsers
      - image: circleci/postgres:10-alpine-postgis
        environment:
          POSTGRES_USER: ubuntu
          POSTGRES_DB: circle_test
      - image: circleci/redis
    environment:
      DJANGO_SETTINGS_MODULE: auricroad.auricroad.settings.circleci
    working_directory: /home/circleci/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - dependencies-{{ checksum "requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
      - run:
          command: |
            echo 'export PATH=/home/circleci/.local/bin/:$PATH' >> $BASH_ENV
            source $BASH_ENV
      - run: pip install --user -r requirements-dev.txt
      - run: npm install
      - run: npm install webpack
      - run: npm run build
      - run: python manage.py makemigrations
      - run: python manage.py migrate
      - run: bandit -r auricroad/ -l --ini .bandit -x tests.py
      - run: isort --recursive --check-only --builtin django --skip-glob "*/migrations/*.py" auricroad/
      - run: prospector auricroad -X -I "auricroad/settings/*"
      - run: coverage run --source='.' manage.py test
      - run: codecov

  deploy:
    docker:
        - image: buildpack-deps:trusty
    working_directory: /home/circleci/project
    steps:
      - checkout
      - run:
          name: "Deploy"
          command: |
                if [ "${CIRCLE_BRANCH}" == "develop" ]; then
                  git push https://heroku:$HEROKU_API_KEY@git.heroku.com/auricroad-dev.git develop:master;
                elif [ "${CIRCLE_BRANCH}" == "staging" ]; then
                  git push https://heroku:$HEROKU_API_KEY@git.heroku.com/auricroad-staging.git staging:master;
                elif [ "${CIRCLE_BRANCH}" == "master" ]; then
                  git push https://heroku:$HEROKU_API_KEY@git.heroku.com/auricroad-prod.git master
                fi


workflows:
  version: 2
  build_test_deploy:
    jobs:
      - build
      - test:
          requires:
            - build
      - deploy:
          requires:
            - test
